name: Deploy Angular to GitHub Pages

on:
  push:
    branches:
      - main

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # Hämtar repot
      - name: Checkout repository
        uses: actions/checkout@v4

      # Installerar Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # Installerar dependencies
      - name: Install dependencies
        run: npm ci

      # Bygger Angular-projektet
      - name: Build Angular app
        run: npm run build -- --base-href /latin-bite-frontend/

      # Laddar upp build-filerna
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist/latin-bite-frontend/browser

  deploy:
    runs-on: ubuntu-latest
    needs: build

    steps:
      # Deployar till GitHub Pages
      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4